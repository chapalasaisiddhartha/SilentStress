<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilentStress Chatbot - Login / Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="background-animation"></div>
    <header class="container">
        <a href="index.html" class="logo">SilentStress AI</a>
    </header>

    <div class="auth-container">
        <div class="glass-card auth-card" id="login-section">
            <h2>Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <div id="login-error" class="error-msg"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <span id="login-btn-text">Sign In</span>
                    <span id="login-loader" class="loader" style="display: none;"></span>
                </button>
            </form>
            <div class="auth-links">
                Don't have an account? <a href="#" id="show-register">Register here</a>
            </div>
        </div>

        <div class="glass-card auth-card" id="register-section" style="display: none;">
            <h2>Create an Account</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="register-name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="register-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="register-password" required>
                </div>
                <div id="register-error" class="error-msg"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <span id="register-btn-text">Sign Up</span>
                    <span id="register-loader" class="loader" style="display: none;"></span>
                </button>
            </form>
            <div class="auth-links">
                Already have an account? <a href="#" id="show-login">Sign in here</a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
